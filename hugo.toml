# 외부 테마 없이 자체 layouts/ 사용

[pagination]
  pagerSize = 10

[params]
  description = "매일 07:00 KST, AI 데이터센터 밸류체인 6개 섹터(전력·에너지·냉각·광통신·CPU/NPU·메모리)의 '가치 대비 저평가된 종목 Top 10'을 정량 분석으로 선별합니다."
  dateFormat = "2006-01-02"

[markup.goldmark.renderer]
  unsafe = true   # 리포트 내 HTML(요약 박스, details) 허용

