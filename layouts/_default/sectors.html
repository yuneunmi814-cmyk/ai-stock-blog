{{ define "main" }}
<p class="back"><a href="{{ site.Home.RelPermalink }}">← 홈 · 일일 리포트 목록</a></p>
<h1>AI 데이터센터 밸류체인 — 섹터 전체</h1>
<p class="track-intro">
  AI 데이터센터를 떠받치는 <strong>밸류체인 6개 섹터</strong>를 한눈에 봅니다.
  각 섹터를 펼치면 동종업계 내 <strong>종합점수 순위</strong>가 나오고, "자세히"를 누르면 섹터 상세(지표·차트·수급)로 이동합니다.
</p>
<p class="dash-asof" id="sec-asof"></p>

<section id="sectors-acc"><p class="chart-note">불러오는 중…</p></section>

<script>
(function () {
  var URL = "{{ "data/latest.json" | relURL }}";
  var DETAIL_BASE = "{{ "sectors/" | relURL }}";

  function pct(v) {
    if (v == null) return "—";
    var c = v >= 0 ? "up" : "down";
    return '<span class="' + c + '">' + (v > 0 ? "+" : "") + v + "%</span>";
  }
  function num(v, suf) { return v == null ? "—" : v + (suf || ""); }
  function badge(s) {
    var lvl = s.level || "neutral";
    return '<span class="verdict ' + lvl + '">' + (s.verdict || "—") + "</span>";
  }

  function row(name, s) {
    if (!s) return "";
    var warn = s.trendWarn ? ' <span class="mini-warn" title="최근 1년 하락 추세">▼주의</span>' : "";
    return "<tr>" +
      "<td>" + (s.sectorRank || "—") + "</td>" +
      "<td class=\"sn\"><b>" + name + "</b> <span class=\"tk\">" + s.ticker + "</span>" + warn + "</td>" +
      "<td>" + (s.composite != null ? s.composite.toFixed(3) : "—") + "</td>" +
      "<td>" + num(s.per) + "</td>" +
      "<td>" + num(s.pbr) + "</td>" +
      "<td>" + num(s.ev_ebitda) + "</td>" +
      "<td>" + num(s.roic, "%") + "</td>" +
      "<td>" + pct(s.momentum) + "</td>" +
      "<td>" + badge(s) + "</td></tr>";
  }

  function render(data) {
    document.getElementById("sec-asof").textContent =
      "기준일 " + data.as_of + (data.generated_at ? " · 갱신 " + data.generated_at : "") +
      " · 정량 분석이며 투자 권유가 아닙니다.";
    var secs = data.sectors || [];
    var html = secs.map(function (sec, idx) {
      var members = sec.members || [];
      var best = members.length ? data.stocks[members[0]] : null;
      var bestTxt = best ? (members[0] + " (" + (best.composite != null ? best.composite.toFixed(2) : "—") + ")") : "—";
      var rows = members.map(function (n) { return row(n, data.stocks[n]); }).join("");
      var open = idx === 0 ? " open" : "";
      return '<details class="sector-acc"' + open + '>' +
        '<summary>' +
          '<span class="sec-emoji">' + (sec.emoji || "") + '</span>' +
          '<span class="sec-name">' + sec.key + '</span>' +
          '<span class="sec-count">' + (sec.count || members.length) + '종목</span>' +
          '<span class="sec-best">대표 저평가: <b>' + bestTxt + '</b></span>' +
        '</summary>' +
        '<p class="sec-desc">' + (sec.desc || "") + '</p>' +
        '<div class="table-scroll"><table class="sec-table">' +
          '<thead><tr><th>#</th><th>종목</th><th>종합점수</th>' +
          '<th><span class="term" data-term="per">PER</span></th>' +
          '<th><span class="term" data-term="pbr">PBR</span></th>' +
          '<th><span class="term" data-term="ev_ebitda">EV/EBITDA</span></th>' +
          '<th><span class="term" data-term="roic">ROIC</span></th>' +
          '<th>1년주가</th><th>판정</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table></div>' +
        '<p class="sec-cta"><a href="' + DETAIL_BASE + sec.slug + '/">' +
          (sec.emoji || "") + ' ' + sec.key + ' 섹터 자세히 보기 (지표·차트·수급) →</a></p>' +
        '</details>';
    }).join("");
    document.getElementById("sectors-acc").innerHTML = html ||
      "<p class='chart-note'>섹터 데이터를 불러오지 못했습니다.</p>";
  }

  fetch(URL, { cache: "no-store" }).then(function (r) { return r.json(); })
    .then(render).catch(function () {
      document.getElementById("sectors-acc").innerHTML =
        "<p class='chart-note'>데이터를 불러오지 못했습니다.</p>";
    });
})();
</script>
{{ end }}
