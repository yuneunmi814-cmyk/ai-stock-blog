{{ define "main" }}
<article class="post">
  <h1 class="post-title">{{ .Title }}</h1>
  <div class="post-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">🗓 {{ .Date.Format "2006-01-02" }}</time>
    {{ with .Params.tags }} · {{ range . }}<span class="tag">#{{ . }}</span> {{ end }}{{ end }}
  </div>

  <section id="chart-widget" class="chart-widget" hidden>
    <h2>종목별 3년 주가</h2>
    <label class="chart-pick">종목 선택:
      <select id="chart-select"></select>
    </label>
    <p id="last-close" class="last-close"></p>
    <div class="chart-box"><canvas id="price-chart"></canvas></div>
    <p class="chart-note">월말 종가 기준 · 국내 KRX · 해외 Yahoo Finance</p>

    <div id="supply-wrap">
      <h3>수급 현황 <small id="supply-hold"></small></h3>
      <div class="chart-box chart-box-sm"><canvas id="supply-chart"></canvas></div>
      <p class="chart-note">최근 10거래일 투자자별 순매수(주) · 출처 네이버 금융 ·
        <button class="term" data-term="supply">수급이 뭐예요?</button></p>
    </div>
    <p id="supply-none" class="chart-note" hidden>해외 종목은 투자자별 수급 데이터를 제공하지 않습니다.</p>
  </section>

  <div class="post-content">
    {{ .Content }}
  </div>
  <p class="back"><a href="{{ site.Home.RelPermalink }}">← 전체 리포트 목록</a></p>
</article>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
(function () {
  var el = document.getElementById("chart-data");
  if (!el) return;
  var data;
  try { data = JSON.parse(el.textContent); } catch (e) { return; }
  var names = Object.keys(data);
  if (!names.length) return;

  document.getElementById("chart-widget").hidden = false;
  var sel = document.getElementById("chart-select");
  names.forEach(function (n) {
    var o = document.createElement("option");
    o.value = n; o.textContent = n + " (" + data[n].ticker + ")";
    sel.appendChild(o);
  });

  var chart, supplyChart;
  function showClose(lc) {
    var el = document.getElementById("last-close");
    if (!lc) { el.textContent = ""; return; }
    var unit = lc.cur === "KRW" ? "원" : (" " + (lc.cur || ""));
    var price = lc.cur === "KRW" ? Math.round(lc.price).toLocaleString() : lc.price.toLocaleString();
    var arrow = lc.dir === "up" ? "▲" : (lc.dir === "down" ? "▼" : "—");
    var cls = lc.dir === "up" ? "up" : (lc.dir === "down" ? "down" : "flat");
    var sign = lc.pct > 0 ? "+" : "";
    el.innerHTML = "전일 종가 <b>" + price + unit + "</b> " +
      '<span class="chg ' + cls + '">' + arrow + " " + sign + lc.pct + "%</span>" +
      (lc.date ? ' <span class="cdate">(' + lc.date + " 기준)</span>" : "");
  }
  function draw(name) {
    var d = data[name];
    showClose(d.lastClose);
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("price-chart"), {
      type: "line",
      data: { labels: d.dates, datasets: [{
        label: name, data: d.closes,
        borderColor: "#2563eb", backgroundColor: "rgba(37,99,235,.10)",
        fill: true, tension: .25, pointRadius: 0, borderWidth: 2
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: function (c) { return c.parsed.y.toLocaleString() + " (종가)"; } } } },
        scales: { x: { ticks: { maxTicksLimit: 8 } },
          y: { ticks: { callback: function (v) { return v.toLocaleString(); } } } }
      }
    });
    drawSupply(d.supply);
  }

  function drawSupply(s) {
    var wrap = document.getElementById("supply-wrap");
    var none = document.getElementById("supply-none");
    if (supplyChart) { supplyChart.destroy(); supplyChart = null; }
    if (!s) { wrap.style.display = "none"; none.hidden = false; return; }
    wrap.style.display = "block"; none.hidden = true;
    document.getElementById("supply-hold").textContent =
      s.foreignHold ? "(외국인 보유 " + s.foreignHold + ")" : "";
    var mk = function (label, arr, color) {
      return { label: label, data: arr, backgroundColor: color };
    };
    supplyChart = new Chart(document.getElementById("supply-chart"), {
      type: "bar",
      data: { labels: s.dates, datasets: [
        mk("외국인", s.foreign, "#2563eb"),
        mk("기관", s.organ, "#16a34a"),
        mk("개인", s.individual, "#f59e0b")
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "top" },
          tooltip: { callbacks: { label: function (c) {
            return c.dataset.label + ": " + c.parsed.y.toLocaleString() + "주"; } } } },
        scales: { y: { ticks: { callback: function (v) { return v.toLocaleString(); } } } }
      }
    });
  }

  sel.addEventListener("change", function () { draw(sel.value); });
  draw(names[0]);
})();
</script>
{{ end }}
