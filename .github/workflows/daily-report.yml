name: Daily AI Top3 Report

# 매일 07:00 KST = 22:00 UTC(전일)
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "분석 모드 (live: 실데이터 / sample: 표본)"
        required: false
        default: "live"
        type: choice
        options: [live, sample]

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute report date (KST)
        id: d
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate report
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python scripts/analyze_stock.py \
            --mode "${{ github.event.inputs.mode || 'live' }}" \
            --date "${{ steps.d.outputs.date }}"

      - name: Commit & push post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "_posts/${{ steps.d.outputs.date }}-daily-ai-top3.md"
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "report: ${{ steps.d.outputs.date }} 오늘의 AI 저평가 Top 3"
            git push
          fi
