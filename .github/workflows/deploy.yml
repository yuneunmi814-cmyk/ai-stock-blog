name: Build & Deploy

on:
  # 매 영업일 아침. 07:00 KST = 22:00 UTC(전일). 정시는 혼잡 → 분산 + 백업 1회.
  schedule:
    - cron: "5 22 * * *"    # 07:05 KST
    - cron: "35 22 * * *"   # 07:35 KST (백업)
  push:
    branches: [main]        # 코드/디자인 변경 시 재배포만 (데이터 재수집 X)
  workflow_dispatch:
    inputs:
      limit:
        description: "시장별 종목 수 제한 (비우면 전체)"
        required: false
        default: ""

permissions:
  contents: write   # 생성된 일별 JSON 커밋
  pages: write      # Pages 배포
  id-token: write   # Pages 배포 인증

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Report date (KST)
        if: github.event_name != 'push'
        id: d
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # 백업 cron 중복 방지: 스케줄 실행인데 오늘 파일이 이미 있으면 생성 생략
      - name: Skip if already built
        if: github.event_name == 'schedule'
        id: chk
        run: |
          if [ -f "data/${{ steps.d.outputs.date }}.json" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build report
        if: github.event_name != 'push' && steps.chk.outputs.skip != 'true'
        run: |
          LIM="${{ github.event.inputs.limit }}"
          python scripts/build.py --date "${{ steps.d.outputs.date }}" ${LIM:+--limit $LIM}

      - name: Commit data
        if: github.event_name != 'push' && steps.chk.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: ${{ steps.d.outputs.date }} 저평가 Top 3"
            git push
          fi

      - name: Assemble site
        run: |
          rm -rf _site && mkdir _site
          cp index.html _site/
          cp -r assets _site/
          cp -r data _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
