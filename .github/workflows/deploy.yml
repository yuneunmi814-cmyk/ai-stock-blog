name: Build & Deploy (Hugo)

on:
  # 매일 07:00 KST = 22:00 UTC(전일). GitHub cron은 지연·누락이 잦아 백업 시각 추가.
  schedule:
    - cron: "0 22 * * *"    # 07:00 KST
    - cron: "30 22 * * *"   # 07:30 KST (백업)
    - cron: "0 23 * * *"    # 08:00 KST (백업)
  # 코드/콘텐츠 push 시 재배포
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "분석 모드 (live: 실데이터 / sample: 표본)"
        required: false
        default: "live"
        type: choice
        options: [live, sample]

# Node.js 20 액션 deprecation 대응
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HUGO_VERSION: "0.162.1"

permissions:
  contents: write   # 생성된 리포트 커밋
  pages: write      # Pages 배포
  id-token: write   # Pages 배포 인증

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 리포트 생성: 스케줄/수동 실행 시에만 ---
      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Compute report date (KST)
        if: github.event_name != 'push'
        id: d
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # 백업 cron 중복 방지: 스케줄 실행인데 오늘 리포트가 이미 있으면 생성 생략
      - name: Check existing report
        if: github.event_name != 'push'
        id: chk
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && \
             [ -f "content/posts/${{ steps.d.outputs.date }}-daily-ai-top3.md" ]; then
            echo "오늘(${{ steps.d.outputs.date }}) 리포트 이미 존재 — 생성 생략(백업 cron)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report
        if: github.event_name != 'push' && steps.chk.outputs.skip != 'true'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: |
          python scripts/analyze_stock.py \
            --mode "${{ github.event.inputs.mode || 'live' }}" \
            --date "${{ steps.d.outputs.date }}"

      - name: Commit new report
        if: github.event_name != 'push' && steps.chk.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "content/posts/${{ steps.d.outputs.date }}-daily-ai-top3.md" static/data/latest.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "report: ${{ steps.d.outputs.date }} 오늘의 AI 저평가 Top 3"
            git push
          fi

      # --- Hugo 빌드 (공식 .deb 직접 설치 — 서드파티 액션 미사용) ---
      - name: Install Hugo
        run: |
          wget -q -O hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb
          hugo version

      - name: Build site
        run: hugo --minify --gc

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
